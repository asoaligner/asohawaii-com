name = "asohawaii-website"
compatibility_date = "2024-12-01"
pages_build_output_dir = "out"

# D1 binding — same database used by the existing AI-chat tables and
# the portal_* tables added in migrations/portal/. Production runtime
# bindings are configured in the Cloudflare Pages dashboard; this file
# is the source of truth for `wrangler d1 migrations apply` and for
# local `wrangler pages dev` workflows.
#
# To populate database_id locally:
#   wrangler d1 list                  # find the existing DB id
# Then paste it below. The Pages dashboard binding still wins at
# request time in Production / Preview — wrangler.toml is only used
# for migration / local-dev tooling.
[[d1_databases]]
binding = "DB"
database_name = "aso-chat-logs"
database_id = "43c22dd8-5722-48aa-834c-644e5caec5d1"
migrations_dir = "migrations/portal"
